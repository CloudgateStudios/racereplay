name: Version Increment

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  version_increment:
    name: Version Increment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup git
        run: |
          git config --global user.name 'Build Bot'
          git config --global user.email bot@cloudgatestudios.com

      - name: Install standard-version
        run: npm i -g standard-version

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run standard-version
        working-directory: app
        run: standard-version --release-as ${{ github.event.inputs.release_type }} --tag-prefix ""

      - name: Format CHANGELOG
        working-directory: app
        run: npx prettier --write CHANGELOG.md

      - name: Stage formatted CHANGELOG
        working-directory: app
        run: |
          git add CHANGELOG.md
          git commit --amend --no-edit

      - name: Get tag
        run: |
          export TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Disable repository rulesets
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          mkdir -p /tmp/rulesets
          gh api repos/${{ github.repository }}/rulesets \
            --jq '.[] | select(.enforcement == "active") | .id' | \
          while read id; do
            gh api repos/${{ github.repository }}/rulesets/$id > /tmp/rulesets/$id.json
            jq '{name,target,enforcement: "disabled",bypass_actors,conditions,rules}' \
              /tmp/rulesets/$id.json | \
              gh api repos/${{ github.repository }}/rulesets/$id \
                --method PUT --input - > /dev/null
            echo "Disabled ruleset $id"
          done

      - name: Push version and tag to main
        run: git push --follow-tags origin main

      - name: Re-enable repository rulesets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          for file in /tmp/rulesets/*.json; do
            [ -f "$file" ] || continue
            id=$(jq -r '.id' "$file")
            jq '{name,target,enforcement,bypass_actors,conditions,rules}' "$file" | \
              gh api repos/${{ github.repository }}/rulesets/$id \
                --method PUT --input - > /dev/null
            echo "Re-enabled ruleset $id"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
          generate_release_notes: true
